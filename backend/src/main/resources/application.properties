spring.application.name=monitoriza

# Conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/monitoriza_db
spring.datasource.username=root
spring.datasource.password=

# ✨ CAMBIO: 'create' borra la BD vieja al iniciar y la crea de cero
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Simulador: true = inserta medición cada 5 min; false = apagado (cuando tengas el ESP8266 real)
app.simulador.mediciones.enabled=true
# Histórico mensual (solo si medicion está vacía)
app.seed.historico.enabled=true
app.seed.historico.desde=2026-05-10
app.seed.historico.hasta=2026-06-09
app.seed.historico.intervalo-minutos=5
app.seed.historico.hora-inicio=08:00
app.seed.historico.hora-fin=16:40
app.seed.historico.solo-laboral=true